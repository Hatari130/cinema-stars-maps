<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">

<title>每个人的电影史 · __TITLE__</title>
<style>
:root{--gold:#F2D88F;--dim:#C9A86A;--faint:#D9C28A;--ivory:#F0E6CB;--bg:#060F22;--serif:"Songti SC","STSong","Noto Serif SC","SimSun",Georgia,serif}
html,body{margin:0;height:100%;background:var(--bg);overflow:hidden}
body{font-family:var(--serif);color:var(--dim);-webkit-font-smoothing:antialiased}

#brand p{margin:5px 0 0;font-size:11.5px;letter-spacing:1px;opacity:.7}

.gbtn:hover{background:rgba(242,216,143,.12)}
.gbtn:focus-visible{outline:1px solid rgba(242,216,143,.8);outline-offset:2px}
.gbtn svg{width:15px;height:15px;display:block}
.yr{font-size:11.5px;opacity:.7;letter-spacing:1px;flex:none}
#track{position:relative;width:min(44vw,440px);flex:none}
#time{appearance:none;-webkit-appearance:none;width:100%;height:22px;background:transparent;cursor:pointer;margin:0;display:block}
#epochs{position:absolute;inset:0;pointer-events:none}
#wave{position:absolute;left:0;right:0;top:-15px;height:26px;width:100%;pointer-events:none;display:block}

#time::-moz-range-track{height:2px;background:rgba(201,168,106,.4);border-radius:2px}
#time::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:var(--gold)}
#time:focus-visible{outline:1px solid rgba(242,216,143,.7);outline-offset:6px;border-radius:999px}
#read{display:flex;flex-direction:column;align-items:flex-start;min-width:140px;flex:none}
#ynow{font-size:15px;color:var(--gold);letter-spacing:2px;font-variant-numeric:tabular-nums}
#cnt{font-size:11px;opacity:.75;margin-top:1px;font-style:normal}
#reset{right:18px;bottom:max(22px,env(safe-area-inset-bottom));width:38px;height:38px;display:none}
#tip{display:none;max-width:240px;background:rgba(6,15,34,.93);border:1px solid rgba(201,168,106,.5);border-radius:10px;padding:11px 13px}
#tipname{font-size:14px;color:var(--gold);letter-spacing:1px}
#tipmeta{font-size:11.5px;margin-top:4px;opacity:.85}
#tipnote{font-size:11.5px;margin-top:5px;color:var(--ivory);opacity:.8}
#tipnote:empty{display:none}
#platehead,#platenav,#platelist,#thumb{display:none}
body.platemode #platehead{display:block}
body.platemode #platenav{display:flex}
body.platemode #platelist{display:block}
body.platemode #thumb{display:block}
body.platemode #bar{opacity:.35;pointer-events:none}
body.platemode #hint{display:none}
#platehead{top:max(16px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;max-width:56vw}
body.platemode #brand p{display:none}
body.silverplate #platehead b{color:#E0E8F2}
body.silverplate #platehead i{color:#9FAEC0}
body.silverplate .prow{color:#EBF0F7}
body.silverplate .prow span{color:#9FAEC0}
body.silverplate #platelist{border-color:rgba(159,174,192,.35)}
#platehead b{display:block;font-size:17px;font-weight:400;letter-spacing:2px;color:var(--gold)}
#platehead i{display:block;font-style:normal;font-size:11.5px;color:var(--dim);opacity:.85;margin-top:4px;letter-spacing:.5px}
#platenav{left:18px;bottom:max(22px,env(safe-area-inset-bottom));align-items:center;gap:10px}
#platenav span{font-size:11.5px;letter-spacing:1px;opacity:.75;min-width:42px;text-align:center}

.prow:hover{background:rgba(242,216,143,.1)}
.prow span{color:var(--dim);font-size:11px;flex:none;font-variant-numeric:tabular-nums}
#thumb{right:16px;top:max(16px,env(safe-area-inset-top))}
@media (max-width:880px){body.platemode #platelist{display:none}}
@media (max-width:680px){

#track{flex:1;width:auto;min-width:0}
#epochs b{display:none}
.yr{display:none}
#read{min-width:116px}
#brand h1{font-size:15px}
}
</style>
</head>

else if(p.kind==="band"){x.fillStyle=GOLDA(.28);x.beginPath();x.arc(42,42,rr(p.band[1]),0,6.2832);x.arc(42,42,Math.max(.5,rr(p.band[0])),0,6.2832,true);x.fill("evenodd")}
}
function gotoPlate(i){if(!plates.length)return;plateIdx=(i+plates.length)%plates.length;plate=plates[plateIdx];
plateBand=(plate.kind==="band")?plate.band:null;setInk(!!plate.silver);sel=null;hideTip();
document.getElementById("pltitle").textContent="图版 "+ROM[plateIdx]+" · "+plate.title;
document.getElementById("plsub").textContent=plate.sub;
document.getElementById("plcnt").textContent=(plateIdx+1)+" / "+plates.length;
buildList(plate);drawThumb(plate);framePlate(plate)}
function enterPlates(){plates=buildPlates();plateMode=true;interacted=true;ambient=false;mode="idle";cyr=Y1;timeEl.value=Y1;syncPlayIcon();fadeHint();resetBtn.style.display="flex";document.body.classList.add("platemode");gotoPlate(0)}
function exitPlates(){plateMode=false;plate=null;plateBand=null;setInk(false);document.body.classList.remove("platemode");sel=null;hideTip();camTo(fitS,0,0)}
document.getElementById("atlasbtn").addEventListener("click",function(){plateMode?exitPlates():enterPlates()});
document.getElementById("plprev").addEventListener("click",function(){gotoPlate(plateIdx-1)});
document.getElementById("plnext").addEventListener("click",function(){gotoPlate(plateIdx+1)});
document.getElementById("platelist").addEventListener("click",function(e){var r=e.target.closest(".prow");if(!r||!r.dataset.t)return;var d=byT(r.dataset.t);if(!d)return;var p=T(d.wx,d.wy);sel=d;showTip(d,p[0],p[1])});
})();
</script>
