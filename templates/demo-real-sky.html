#ynow{font-size:15px;color:var(--gold);letter-spacing:2px;font-variant-numeric:tabular-nums}
#cnt{font-size:11px;opacity:.75;margin-top:1px;font-style:normal}

body.platemode #platelist{display:block}

else if(ptrs.size===2){var v=Array.from(ptrs.values());pinch={d:Math.hypot(v[0][0]-v[1][0],v[0][1]-v[1][1]),mx:(v[0][0]+v[1][0])/2,my:(v[0][1]+v[1][1])/2};hideTip()}});
cv.addEventListener("pointermove",function(e){if(!ptrs.has(e.pointerId))return;var prev=ptrs.get(e.pointerId);ptrs.set(e.pointerId,[e.clientX,e.clientY]);
if(ptrs.size===1&&downPos){var dx=e.clientX-prev[0],dy=e.clientY-prev[1];
if(Math.hypot(e.clientX-downPos[0],e.clientY-downPos[1])>5){moved=true;hideTip()}
if(moved){view.ox+=dx;view.oy+=dy;clampPan()}}
else if(ptrs.size===2&&pinch){var v=Array.from(ptrs.values());var nd=Math.hypot(v[0][0]-v[1][0],v[0][1]-v[1][1]),nmx=(v[0][0]+v[1][0])/2,nmy=(v[0][1]+v[1][1])/2;
zoomAt(nmx,nmy,nd/pinch.d);view.ox+=nmx-pinch.mx;view.oy+=nmy-pinch.my;clampPan();pinch={d:nd,mx:nmx,my:nmy};moved=true}});
function up(e){ptrs.delete(e.pointerId);if(ptrs.size<2)pinch=null;
if(ptrs.size===0){cv.classList.remove("drag");
if(!moved&&downPos&&performance.now()-downT<400)tapAt(e.clientX,e.clientY);
downPos=null}}
cv.addEventListener("pointerup",up);cv.addEventListener("pointercancel",up);
cv.addEventListener("wheel",function(e){e.preventDefault();wake();hideTip();zoomAt(e.clientX,e.clientY,Math.exp(-e.deltaY*.0014))},{passive:false});
cv.addEventListener("dblclick",function(e){wake();zoomAt(e.clientX,e.clientY,1.6)});
resetBtn.addEventListener("click",function(){hideTip();if(plateMode&&plate)framePlate(plate);else{cam=null;view.s=fitS;view.ox=0;view.oy=0}});
window.addEventListener("keydown",function(e){if(e.key==="Escape"){if(tip.style.display==="block")hideTip();else if(plateMode)exitPlates();return}if(!plateMode)return;if(e.key==="ArrowRight")gotoPlate(plateIdx+1);else if(e.key==="ArrowLeft")gotoPlate(plateIdx-1)});
var ROM=["I","II","III","IV","V","VI","VII","VIII","IX","X"];
function buildPlates(){
var watched=nm.filter(function(d){return !d.inv});
var P=[];
var sc=[],bri=[];for(var bi2=0;bi2<REG.length;bi2++){sc.push(0);bri.push(null)}
watched.forEach(function(d){sc[d.s]++;if(!bri[d.s]||d.m>bri[d.s].m||(d.m===bri[d.s].m&&d.y<bri[d.s].y))bri[d.s]=d});
var kk2=[];for(var k=0;k<REG.length;k++)if(sc[k]>=7)kk2.push(k);
kk2.sort(function(a,b){return sc[b]-sc[a]||a-b});kk2.slice(0,4).forEach(function(k){
var cs=0;lines.forEach(function(L){var n2=0;L.g.forEach(function(t){if(byT(t).s===k)n2++});if(n2>=2)cs++});
P.push({kind:"region",sec:k,a0:REG[k].a0,a1:REG[k].a1,title:REG[k].n,sub:sc[k]+"颗星 · 最亮《"+bri[k].t+"》"+(cs?" · "+cs+"座星座":""),
test:(function(kx){return function(d){return d.s===kx}})(k)})});
var silent=watched.filter(function(d){return d.y<=1929});
if(silent.length>=10){var sb=silent.slice().sort(function(a,b){return b.m-a.m||a.y-b.y})[0];
P.push({kind:"band",band:[1895,1929],title:"默片纪元",sub:silent.length+"颗星 · 1895–1929 · 最亮《"+sb.t+"》",silver:1,test:function(d){return d.y<=1929}})}
var bestD=0,bestN=0;
for(var dy=1930;dy<=2020;dy+=10){var n3=watched.filter(function(d){return d.y>=dy&&d.y<dy+10}).length;if(n3>bestN){bestN=n3;bestD=dy}}
if(bestN>=12){var db=watched.filter(function(d){return d.y>=bestD&&d.y<bestD+10}).sort(function(a,b){return b.m-a.m||a.y-b.y})[0];
P.push({kind:"band",band:[bestD,bestD+9],title:bestD+"年代",sub:bestN+"颗星 · 最亮《"+db.t+"》",
test:(function(d0){return function(d){return d.y>=d0&&d.y<d0+10}})(bestD)})}
var cc=[0,0,0,0,0];watched.forEach(function(d){cc[REG[d.s].c]++});
var dk=0;for(var ci2=1;ci2<5;ci2++)if(cc[ci2]<cc[dk])dk=ci2;
var bset={};REG.forEach(function(r,ri){if(r.c===dk)bset[ri]=1});
P.push({kind:"dark",bands:bset,a0:CONTB[dk][0],a1:CONTB[dk][1],title:"暗区 · "+CONT[dk],sub:(cc[dk]?cc[dk]+"颗星":"尚无一颗星"),
test:function(d){return !!bset[d.s]}});
return P.slice(0,8)}
function camTo(s3,ox3,oy3){cam={t0:performance.now(),dur:750,f:{s:view.s,ox:view.ox,oy:view.oy},t:{s:s3,ox:ox3,oy:oy3}}}
function framePlate(p){
if(p.kind==="all"){camTo(fitS,0,0);return}
var pts=[];nm.forEach(function(d){if(p.test(d))pts.push([d.wx,d.wy])});
if(p.a0!=null){for(var a=0;a<=6;a++){var g=(p.a0+(p.a1-p.a0)*a/6-90)*Math.PI/180;pts.push([RW*Math.cos(g),RW*Math.sin(g)]);pts.push([9*Math.cos(g),9*Math.sin(g)])}}
if(p.kind==="band"){var r1=ry(Math.min(p.band[1],Y1));for(var a2=0;a2<24;a2++){var g2=a2/24*6.2832;pts.push([r1*Math.cos(g2),r1*Math.sin(g2)])}}
if(!pts.length){camTo(fitS,0,0);return}
var c=Math.cos(view.th),s2=Math.sin(view.th);
var xs=pts.map(function(q){return q[0]*c-q[1]*s2}),ys=pts.map(function(q){return q[0]*s2+q[1]*c});
var x0=Math.min.apply(null,xs),x1=Math.max.apply(null,xs),y0=Math.min.apply(null,ys),y1=Math.max.apply(null,ys);
var bw=Math.max(30,x1-x0),bh=Math.max(30,y1-y0);
var panel=(plateMode&&window.innerWidth>=880)?244:0;
var ts=Math.max(fitS*.85,Math.min(fitS*4.5,Math.min((W-panel-90)/bw,(H-240)/bh)));
camTo(ts,(W-panel)/2-W/2-ts*(x0+x1)/2,H*.52-C0Y-ts*(y0+y1)/2)}
function buildList(p){var el=document.getElementById("platelist");
if(!p||!p.test){el.innerHTML="";return}
var items=nm.filter(function(d){return !d.inv&&p.test(d)}).sort(function(a,b){return a.y-b.y||(a.t<b.t?-1:1)});
el.innerHTML=items.map(function(d){return '<div class="prow" data-t="'+d.t+'"><span>'+d.y+'</span>'+d.t+'</div>'}).join("")}
function drawThumb(p){var tc=document.getElementById("thumb"),x=tc.getContext("2d");
var dpr=Math.min(window.devicePixelRatio||1,2);tc.width=84*dpr;tc.height=84*dpr;x.setTransform(dpr,0,0,dpr,0,0);
x.clearRect(0,0,84,84);x.fillStyle="rgba(6,15,34,.7)";x.beginPath();x.arc(42,42,40,0,6.2832);x.fill();
x.strokeStyle=DIMA(.55);x.lineWidth=1;x.beginPath();x.arc(42,42,33,0,6.2832);x.stroke();
function rr(y){return 2+(ry(y)/RW)*31}
if(p.kind==="all"){x.fillStyle=GOLDA(.15);x.beginPath();x.arc(42,42,33,0,6.2832);x.fill()}
else if(p.a0!=null){var a0=(p.a0-90)*Math.PI/180,a1=(p.a1-90)*Math.PI/180;
x.fillStyle=p.kind==="dark"?GOLDA(.14):GOLDA(.3);
x.beginPath();x.moveTo(42,42);x.arc(42,42,33,a0,a1);x.closePath();x.fill()}
else if(p.kind==="band"){x.fillStyle=GOLDA(.28);x.beginPath();x.arc(42,42,rr(p.band[1]),0,6.2832);x.arc(42,42,Math.max(.5,rr(p.band[0])),0,6.2832,true);x.fill("evenodd")}
}
function gotoPlate(i){if(!plates.length)return;plateIdx=(i+plates.length)%plates.length;plate=plates[plateIdx];
plateBand=(plate.kind==="band")?plate.band:null;setInk(!!plate.silver);sel=null;hideTip();
document.getElementById("pltitle").textContent="图版 "+ROM[plateIdx]+" · "+plate.title;
document.getElementById("plsub").textContent=plate.sub;
document.getElementById("plcnt").textContent=(plateIdx+1)+" / "+plates.length;
buildList(plate);drawThumb(plate);framePlate(plate)}
function enterPlates(){plates=buildPlates();plateMode=true;interacted=true;ambient=false;mode="idle";cyr=Y1;timeEl.value=Y1;syncPlayIcon();fadeHint();resetBtn.style.display="flex";document.body.classList.add("platemode");gotoPlate(0)}
function exitPlates(){plateMode=false;plate=null;plateBand=null;setInk(false);document.body.classList.remove("platemode");sel=null;hideTip();camTo(fitS,0,0)}
document.getElementById("atlasbtn").addEventListener("click",function(){plateMode?exitPlates():enterPlates()});
document.getElementById("plprev").addEventListener("click",function(){gotoPlate(plateIdx-1)});
document.getElementById("plnext").addEventListener("click",function(){gotoPlate(plateIdx+1)});
document.getElementById("platelist").addEventListener("click",function(e){var r=e.target.closest(".prow");if(!r||!r.dataset.t)return;var d=byT(r.dataset.t);if(!d)return;var p=T(d.wx,d.wy);sel=d;showTip(d,p[0],p[1])});
})();
</script>
