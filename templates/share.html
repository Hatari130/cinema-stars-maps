<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>__TITLE__ · 分享星图</title>
<style>
:root{--night:#030917;--navy:#07142b;--gold:#f2d88f;--dim:#c9a86a;--ivory:#f0e6cb;--serif:"Songti SC","STSong","Noto Serif SC","SimSun",Georgia,serif}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--night);color:var(--dim);font-family:var(--serif)}
body{display:grid;place-items:center;padding:28px;background:
radial-gradient(circle at 50% 24%,rgba(39,63,96,.34),transparent 46%),
linear-gradient(180deg,#020713,#061026)}
.poster{position:relative;height:min(780px,calc(100svh - 40px));min-height:640px;max-width:100%;aspect-ratio:9/16;overflow:hidden;border:1px solid rgba(201,168,106,.34);background:#060f22;
box-shadow:0 36px 100px rgba(0,0,0,.54)}
.card-image{display:block;width:100%;height:100%;object-fit:contain}
.hotspot{position:absolute;z-index:2;border:0;background:transparent;color:transparent;cursor:pointer;text-decoration:none}
.hotspot:focus-visible{outline:2px solid rgba(242,216,143,.9);outline-offset:3px}
#downloadHotspot{left:8.89%;top:82.19%;width:37.78%;height:3.96%}
#viewHotspot{left:49.44%;top:82.19%;width:41.67%;height:3.96%}
#shareNote{position:absolute;left:30px;right:30px;bottom:12px;text-align:center;font-size:10px;color:rgba(240,230,203,.5);opacity:0;transition:opacity .2s}
#shareNote.show{opacity:1}
@media(max-width:520px){
body{padding:0}
.poster{width:100%;height:auto;min-height:100svh;aspect-ratio:auto;border:0}
.card-image{height:auto}
}
</style>
</head>
<body>
<main class="poster">
<img id="cardImage" class="card-image" src="/sky/__SLUG__/share-card.svg" alt="__TITLE__ 分享星图">
<button class="hotspot" id="downloadHotspot" type="button" aria-label="下载分享星图">下载分享星图</button>
<a class="hotspot" id="viewHotspot" href="/sky/__SLUG__" aria-label="查看完整星图">查看完整星图</a>
<div id="shareNote" role="status">正在生成图片…</div>
</main>
<script>
(function(){
var button=document.getElementById("downloadHotspot"),note=document.getElementById("shareNote"),cardImage=document.getElementById("cardImage");
function showNote(text){
  note.textContent=text;note.classList.add("show");setTimeout(function(){note.classList.remove("show")},2200);
}
function fileNameFromTitle(){
  var t=__TITLE_JS__;return (t?t.replace(/[\\/:*?"<>|]/g,"-"):"我的电影史")+"-星图.png";
}
button.addEventListener("click",async function(){
  showNote("正在生成图片…");
  try{
    var res=await fetch(cardImage.src,{cache:"no-store"});
    var svgText=await res.text();
    var blob=new Blob([svgText],{type:"image/svg+xml;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var img=new Image();
    await new Promise(function(resolve,reject){img.onload=resolve;img.onerror=reject;img.src=url;});
    var canvas=document.createElement("canvas");
    var scale=2;
    canvas.width=img.width*scale;canvas.height=img.height*scale;
    var ctx=canvas.getContext("2d");
    ctx.fillStyle="#060F22";ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    var pngBlob=await new Promise(function(resolve){canvas.toBlob(resolve,"image/png");});
    var pngUrl=URL.createObjectURL(pngBlob);
    var a=document.createElement("a");a.href=pngUrl;a.download=fileNameFromTitle();
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(pngUrl);URL.revokeObjectURL(url);
    showNote("图片已保存");
  }catch(err){
    console.error(err);showNote("生成图片失败");
  }
});
})();
</script>
</body>
</html>
