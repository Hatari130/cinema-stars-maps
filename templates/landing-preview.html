<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>每个人的电影史</title>
<style>
*{margin:0;box-sizing:border-box}
body{min-height:100vh;display:flex;background:#060F22;font-family:'Songti SC','Noto Serif SC','Noto Serif CJK SC',serif;color:#C9A86A;overflow:hidden}
.left{flex:1;position:relative;min-height:100vh}
.left::after{content:'';position:absolute;right:0;top:0;bottom:0;width:80px;background:linear-gradient(to right,transparent,#060F22);pointer-events:none;z-index:1}
canvas{position:absolute;inset:0;width:100%;height:100%}
.right{width:420px;display:flex;flex-direction:column;justify-content:center;padding:48px 48px 48px 32px;position:relative;z-index:2}
h1{color:#F2D88F;font-weight:400;letter-spacing:5px;font-size:24px;margin-bottom:8px}
.sub{font-size:13px;opacity:.65;line-height:1.8;margin-bottom:36px}
.epi{font-size:12.5px;font-style:italic;opacity:.4;margin-bottom:32px;line-height:1.7;letter-spacing:.5px}
input[type=text]{width:100%;padding:12px 16px;margin-bottom:14px;background:rgba(6,15,34,.5);border:1px solid rgba(201,168,106,.35);border-radius:10px;color:#F0E6CB;font-family:inherit;font-size:14px;outline:none;transition:border-color .3s}
input[type=text]:focus{border-color:rgba(242,216,143,.7)}
input[type=text]::placeholder{color:rgba(201,168,106,.45)}
.btn{display:inline-block;margin-top:10px;padding:11px 38px;background:transparent;cursor:pointer;border:1px solid rgba(201,168,106,.5);border-radius:999px;color:#F2D88F;font-family:inherit;letter-spacing:3px;font-size:14px;transition:all .3s}
.btn:hover{background:rgba(242,216,143,.08);border-color:rgba(242,216,143,.8)}
.toggle{margin-top:16px;font-size:12px;opacity:.55;cursor:pointer;text-decoration:none;color:#C9A86A;display:inline-block}
.toggle:hover{opacity:.85}
.foot{font-size:11px;opacity:.4;margin-top:28px;letter-spacing:1px}
.csvform{display:none;margin-top:18px}
.csvform input[type=file]{color:#C9A86A;font-size:12px;margin-bottom:10px}
@media(max-width:860px){body{flex-direction:column}.left{min-height:40vh;flex:none}.left::after{display:none}.right{width:100%;padding:28px 32px;align-items:center;text-align:center}.epi{display:none}}
</style></head><body>
<div class="left"><canvas id="cv"></canvas></div>
<div class="right">
<h1>每个人的电影史</h1>
<p class="sub">输入豆瓣 ID,生成你的电影史星空。</p>
<p class="epi">世上没有一部电影史,只有许多部。这一部,是你的。</p>
<form id="mainform" method="post" action="/api/skies" enctype="multipart/form-data">
<input type="text" name="douban_id" id="dbid" placeholder="豆瓣用户 ID 或观影页链接">
<input type="text" name="title" placeholder="给这片天空起个名(可不填)">
<div style="display:none" id="csvwrap"><input type="file" name="file" accept=".csv"></div>
<button type="submit" class="btn">点亮星空</button>
</form>
<a class="toggle" id="csvtoggle">使用 CSV 导入</a>
<p class="foot">匿名 · 无账号 · 链接即身份 · 可随时删除</p>
</div>
<script>
document.getElementById('csvtoggle').addEventListener('click',function(){
var w=document.getElementById('csvwrap'),d=document.getElementById('dbid');
if(w.style.display==='none'){w.style.display='block';d.style.display='none';this.textContent='使用豆瓣 ID'}
else{w.style.display='none';d.style.display='block';this.textContent='使用 CSV 导入'}});
var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
var dpr=Math.min(devicePixelRatio||1,2),W,H;
function resize(){var r=cv.getBoundingClientRect();W=r.width;H=r.height;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}
resize();addEventListener('resize',resize);
var films=[
["公民凯恩",1941],["迷魂记",1958],["东京物语",1953],["花样年华",2000],
["教父",1972],["精疲力尽",1960],["七武士",1954],["2001太空漫游",1968],
["四百击",1959],["低俗小说",1994],["霸王别姬",1993],["潜行者",1979],
["雨中曲",1952],["千与千寻",2001],["穆赫兰道",2001],["寄生虫",2019],
["偷自行车的人",1948],["游戏规则",1939],["八部半",1963],["出租车司机",1976],
["现代启示录",1979],["持摄影机的人",1929],["日落大道",1950],["后窗",1954],
["大路",1954],["恐惧吞噬灵魂",1974],["秋刀鱼之味",1962],["唐人街",1974],
["重庆森林",1994],["杀人回忆",2003],["悲情城市",1989],["小城之春",1948],
["罗生门",1950],["大都会",1927],["晚春",1949],["狂人皮埃罗",1965],
["热情似火",1959],["一一",2000],["好家伙",1990],["牯岭街少年杀人事件",1991]
];
function hash(t){var h=2166136261;for(var i=0;i<t.length;i++){h^=t.charCodeAt(i);h=Math.imul(h,16777619)}return(h>>>0)/4294967296}
var Y0=1895,Y1=2026,RIN=18,cx,cy,RW;
var stars=films.map(function(f,i){
var a=hash(f[0])*.9+.05,rf=.12+.76*hash(String.fromCharCode(1)+f[0]);
var yr=Math.min(f[1]+rf,Y1-.05);
var r=(yr-Y0)/(Y1-Y0);
var ang=(a*360-90)*Math.PI/180;
var mag=i<4?4:(i<10?3:(i<20?2:1));
return{t:f[0],y:f[1],a:ang,r:r,ph:hash(f[0]+f[0])*6.28,sp:.4+hash(f[0]+"s")*.8,m:mag,i:i}
});
var conns=[[0,11],[1,13],[3,28],[4,19],[12,7],[2,17]];
function star4(x,y,R){ctx.beginPath();var w=R*.27;ctx.moveTo(x,y-R);ctx.lineTo(x+w,y-w);ctx.lineTo(x+R,y);ctx.lineTo(x+w,y+w);ctx.lineTo(x,y+R);ctx.lineTo(x-w,y+w);ctx.lineTo(x-R,y);ctx.lineTo(x-w,y-w);ctx.closePath()}
function draw(now){
ctx.clearRect(0,0,W,H);
cx=W*.48;cy=H*.5;RW=Math.min(W,H)*.42;
var sc=RW-RIN;
ctx.strokeStyle='rgba(201,168,106,.05)';ctx.lineWidth=.8;
for(var yr=1905;yr<2026;yr+=10){var rr=RIN+sc*(yr-Y0)/(Y1-Y0);ctx.beginPath();ctx.arc(cx,cy,rr,0,6.2832);ctx.stroke()}
ctx.strokeStyle='rgba(201,168,106,.15)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,RIN+sc,0,6.2832);ctx.stroke();
var grd=ctx.createRadialGradient(cx,cy,0,cx,cy,4);grd.addColorStop(0,'rgba(242,216,143,.9)');grd.addColorStop(1,'rgba(242,216,143,0)');ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,4,0,6.2832);ctx.fill();
var pos=stars.map(function(s){var rr=RIN+s.r*sc;return[cx+rr*Math.cos(s.a),cy+rr*Math.sin(s.a)]});
conns.forEach(function(c){var p=pos[c[0]],q=pos[c[1]];ctx.strokeStyle='rgba(242,216,143,.12)';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.lineTo(q[0],q[1]);ctx.stroke()});
stars.forEach(function(s,i){
var x=pos[i][0],y=pos[i][1];
var tw=.75+.25*Math.sin(now/1000*s.sp+s.ph);
var sz=s.m>=4?4.5:(s.m===3?3.5:(s.m===2?2.8:2));
if(s.m>=3){ctx.fillStyle='rgba(242,216,143,'+(tw*.1).toFixed(2)+')';ctx.beginPath();ctx.arc(x,y,sz+6,0,6.2832);ctx.fill()}
ctx.fillStyle='rgba(242,216,143,'+(tw*.9).toFixed(2)+')';
star4(x,y,sz);ctx.fill()
});
var boxes=[];
function tryP(bx){for(var j=0;j<boxes.length;j++){var o=boxes[j];if(bx.x<o.x+o.w+4&&bx.x+bx.w+4>o.x&&bx.y<o.y+o.h+2&&bx.y+bx.h+2>o.y)return false}boxes.push(bx);return true}
stars.forEach(function(s,i){var x=pos[i][0],y=pos[i][1];boxes.push({x:x-5,y:y-5,w:10,h:10})});
ctx.font='12px "Songti SC","Noto Serif SC",serif';
var order=stars.map(function(s,i){return i}).sort(function(a,b){return stars[b].m-stars[a].m});
order.forEach(function(i){
var s=stars[i],x=pos[i][0],y=pos[i][1];
var phase=(now/5000+i*.13)%1;
var la=phase<.3?phase/.3:(phase<.6?1:(1-(phase-.6)/.4));
la=la*la*(s.m>=3?.7:.5);
if(la<.05)return;
var txt=s.t,tw2=ctx.measureText(txt).width;
var right=x>cx,ox=right?8:-8-tw2,oy=4;
var bx={x:x+ox,y:y+oy-11,w:tw2,h:13};
if(!tryP(bx)){bx.y=y-14;bx.x=x-tw2/2;if(!tryP(bx)){bx.y=y+8;if(!tryP(bx))return}}
ctx.fillStyle='rgba(240,230,203,'+la.toFixed(2)+')';
ctx.textAlign='left';ctx.fillText(txt,bx.x,bx.y+11)
});
requestAnimationFrame(draw)}
requestAnimationFrame(draw);
</script></body></html>
